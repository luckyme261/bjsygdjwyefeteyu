name: VPS Automation and Sync Core

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Codebase
        uses: actions/checkout@v4

      - name: Run VPS Install Script & Start Runtime Monitor
        env:
          E2_ACCESS_KEY_1: ${{ secrets.E2_ACCESS_KEY_1 }}
          E2_SECRET_1: ${{ secrets.E2_SECRET_1 }}
          E2_ENDPOINT_1: ${{ secrets.E2_ENDPOINT_1 }}
          E2_BUCKET_1: ${{ secrets.E2_BUCKET_1 }}
          E2_ACCESS_KEY_2: ${{ secrets.E2_ACCESS_KEY_2 }}
          E2_SECRET_2: ${{ secrets.E2_SECRET_2 }}
          E2_ENDPOINT_2: ${{ secrets.E2_ENDPOINT_2 }}
          E2_BUCKET_2: ${{ secrets.E2_BUCKET_2 }}
        run: |
          # 1. Run the system setup
          chmod +x install.sh
          ./install.sh

          # 2. Start the 5-Hour Active Monitoring Cycle
          echo "🛰️ VPS Active. Running 5-hour monitored runtime loop..."
          
          elapsed=0
          while [ $elapsed -lt 300 ]; do
              sleep 600
              elapsed=$((elapsed + 10))
              echo "⏱️ Heartbeat: $elapsed minutes elapsed. System alive."
          done

          # 3. Time limit reached safely -> Fire freeze & backup
          echo "📦 [CRITICAL] 5-Hour mark reached safely. Initiating automated Docker freeze and Sync..."
          
          if command -v pm2 &> /dev/null; then
              echo "[PM2] Saving current process list..."
              pm2 save --force || true
          fi
          
          # Execute global backup command
          push

          # 4. Chain Reaction: Dispatch next runner in the account chain
          # CHANGE THIS VALUE to the next target account and repo in your 5-account loop!
          NEXT_TARGET_REPO="NEXT_GITHUB_USERNAME/NEXT_REPO_NAME"

          echo "🔄 5-Hour cycle clear. Dispatching next container at $NEXT_TARGET_REPO..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$NEXT_TARGET_REPO/actions/workflows/main.yml/dispatches \
            -d '{"ref":"main"}'
