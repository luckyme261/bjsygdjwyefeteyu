name: Continuous proj

on:
  workflow_dispatch:
  schedule:
    # Backup trigger every 5 hours
    - cron: '0 */5 * * *'

jobs:
  run-vps:
    runs-on: ubuntu-latest
    # 5 hours runtime + 15 minutes safety margin for final sync upload
    timeout-minutes: 315

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Make Scripts Executable
        run: chmod +x ./install.sh

      - name: Run Bootloader Setup
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
        run: ./install.sh

      - name: 5-Hour Keep-Alive Timer
        run: |
          echo "⏱️ initialized. Holding session active for EXACTLY 5 hours..."
          
          # Target duration: 5 hours * 3600 seconds = 18000 seconds
          TARGET_SECONDS=18000
          START_TIME=$(date +%s)
          
          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$(( CURRENT_TIME - START_TIME ))
            REMAINING=$(( TARGET_SECONDS - ELAPSED ))
            
            if [ $ELAPSED -ge $TARGET_SECONDS ]; then
              echo "⏰ 5 Hours reached! Exiting loop to start automated backup..."
              break
            fi
            
            MINS_LEFT=$(( REMAINING / 60 ))
            echo "⌛ System operational. Time remaining: ${MINS_LEFT} minutes..."
            
            # Sleep in 30-minute intervals (1800 seconds) or remaining time
            SLEEP_TIME=1800
            if [ $REMAINING -lt $SLEEP_TIME ]; then
              SLEEP_TIME=$REMAINING
            fi
            
            sleep $SLEEP_TIME
          done

      - name: Execute Automated 5-Hour B2 Sync
        if: always()
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
        run: |
          echo "📤 Starting automated state sync to Backblaze B2..."
          sudo /usr/local/bin/push || true

      - name: Trigger Next VPS Iteration
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 Relaunching VPS workflow for seamless continuation..."
          gh workflow run main.yml || true
