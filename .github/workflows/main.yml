name: VPS Automation and Sync Core

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Codebase
        uses: actions/checkout@v4

      - name: Run VPS Install Script
        env:
          E2_ACCESS_KEY_1: ${{ secrets.E2_ACCESS_KEY_1 }}
          E2_SECRET_1: ${{ secrets.E2_SECRET_1 }}
          E2_ENDPOINT_1: ${{ secrets.E2_ENDPOINT_1 }}
          E2_BUCKET_1: ${{ secrets.E2_BUCKET_1 }}
          E2_ACCESS_KEY_2: ${{ secrets.E2_ACCESS_KEY_2 }}
          E2_SECRET_2: ${{ secrets.E2_SECRET_2 }}
          E2_ENDPOINT_2: ${{ secrets.E2_ENDPOINT_2 }}
          E2_BUCKET_2: ${{ secrets.E2_BUCKET_2 }}
        run: |
          chmod +x install.sh
          ./install.sh

      - name: Start Persistent Cloudflare Edge Tunnel
        run: |
          echo "🌐 Launching persistent Cloudflare Tunnel engine..."
          # Running this in a separate action step with a simple log redirect allows GitHub to monitor it cleanly without killing it
          cloudflared tunnel run --token eyJhIjoiNDAwNmMxYTcwNmVhM2Y4NTFiMzViMWMyYTg1MDU5OGAiLCJ0IjoiMmRiZGY3MjctYzYxNC00ZTQ0LThiYTQtOTEzNGJhZjU4ZWI4IiwicyI6IlpURXpOakF3WkRNdE5ESXlZeTAwTURrMkxXSmpZamd0WkROaU5tWmxaakZqTnpBMyJ9 > cloudflared.log 2>&1 &
          sleep 5
          cat cloudflared.log

      - name: Enter the 5-Hour Active Monitoring Cycle
        run: |
          echo "🛰️ VPS Active. Running 5-hour monitored runtime loop..."
          elapsed=0
          while [ $elapsed -lt 300 ]; do
              sleep 600
              elapsed=$((elapsed + 10))
              echo "⏱️ Heartbeat: $elapsed minutes elapsed. System alive."
          done

          echo "📦 [CRITICAL] 5-Hour mark reached safely. Initiating backup..."
          if command -v pm2 &> /dev/null; then
              pm2 save --force || true
          fi
          
          push

          echo "🔄 5-Hour cycle clear. Fetching next target from secrets..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ secrets.NEXT_TARGET_REPO }}/actions/workflows/main.yml/dispatches \
            -d '{"ref":"main"}'
