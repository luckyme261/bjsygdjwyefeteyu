name: VPS Automation and Sync Core

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Codebase
        uses: actions/checkout@v4

      - name: Run VPS Install Script & Provision Infrastructure
        env:
          E2_ACCESS_KEY_1: ${{ secrets.E2_ACCESS_KEY_1 }}
          E2_SECRET_1: ${{ secrets.E2_SECRET_1 }}
          E2_ENDPOINT_1: ${{ secrets.E2_ENDPOINT_1 }}
          E2_BUCKET_1: ${{ secrets.E2_BUCKET_1 }}
          E2_ACCESS_KEY_2: ${{ secrets.E2_ACCESS_KEY_2 }}
          E2_SECRET_2: ${{ secrets.E2_SECRET_2 }}
          E2_ENDPOINT_2: ${{ secrets.E2_ENDPOINT_2 }}
          E2_BUCKET_2: ${{ secrets.E2_BUCKET_2 }}
        run: |
          chmod +x install.sh
          ./install.sh

      - name: Enter the 5-Hour Active Monitoring Cycle
        run: |
          echo "🛰️ VPS Active. Running 5-hour monitored runtime loop..."
          
          # 300 minutes = 5 hours (checking status updates every 10 minutes)
          elapsed=0
          while [ $elapsed -lt 300 ]; do
              sleep 600
              elapsed=$((elapsed + 10))
              echo "⏱️ Heartbeat: $elapsed minutes elapsed. System alive."
          done

          # ==========================================
          # LIFECYCLE CONCLUSION: AUTOFREEZE & SYNC
          # ==========================================
          echo "📦 [CRITICAL] 5-Hour mark reached safely. Initiating automated Docker freeze and Sync..."
          
          if command -v pm2 &> /dev/null; then
              echo "[PM2] Saving current process registry state..."
              pm2 save --force || true
          fi
          
          # Execute the global system push command injected by install.sh
          push

          # ==========================================
          # CHAIN DISPATCH: SPIN UP NEXT ACCOUNT
          # ==========================================
          echo "🔄 5-Hour cycle clear. Fetching next target from secrets..."
          
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ secrets.NEXT_TARGET_REPO }}/actions/workflows/main.yml/dispatches \
            -d '{"ref":"main"}'
