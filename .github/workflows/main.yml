name: VPS Bootloader & Persistent Environment

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 3600 # Maximum allowed job duration (60 hours)

    # Expose secrets to ALL steps in this job
    env:
      B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_BUCKET: ${{ secrets.B2_BUCKET }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Make Scripts Executable
        run: |
          chmod +x ./install.sh

      - name: Run VPS Bootloader
        run: |
          ./install.sh

      - name: Keep-Alive Loop (Persistent VPS Session)
        run: |
          echo "🌐 VPS is now live and fully accessible via Cloudflare Tunnel SSH!"
          echo "💡 Run 'push' inside your SSH session anytime to sync state to Backblaze B2."
          
          # Infinite loop to keep the runner alive
          while true; do
            sleep 60
          done
