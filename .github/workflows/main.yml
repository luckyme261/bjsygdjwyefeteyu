name: Project-Module-V5.5

on:
  workflow_dispatch:
    inputs:
      generation:
        default: '1'
  repository_dispatch:
    types: [trigger_vps]

jobs:
  vps-runtime:
    runs-on: ubuntu-latest
    env:
      R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
      R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      BUCKET_NAME: "storage"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision & Pull
        run: |
          sudo npm install -g pm2
          chmod +x install.sh
          ./install.sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Restore PM2 State
        run: |
          while [ ! -f /home/runner/.files_ready ]; do sleep 2; done
          while [ ! -f /home/runner/.deps_ready ]; do sleep 2; done
          
          pm2 ping
          if [ -f /home/runner/.pm2/dump.pm2 ]; then
            pm2 resurrect || true
            pm2 restart all --update-env || true
          fi

      - name: Background Incremental Sync (10-Minute Loop)
        id: sync_loop
        run: |
          (
            while true; do
              sleep 600
              # Check if a freeze is in progress
              if [ -f /tmp/vps_frozen ]; then break; fi
              
              pm2 save --force > /dev/null 2>&1
              nice -n 19 rclone sync /home/runner r2_storage:$BUCKET_NAME \
                --exclude "actions-runner/**" --exclude "_work/**" \
                --exclude "**/node_modules/**" --exclude ".npm/**" --exclude ".cache/**" \
                --checksum --fast-list --quiet
            done
          ) &

      - name: 5-Hour Timed Handoff
        env:
          NEXT_TOKEN: ${{ secrets.N_GH_TOKEN }}
          NEXT_REPO: ${{ secrets.REPO }}
        run: |
          # Wait 5 hours + random jitter
          sleep $((18000 + RANDOM % 900))
          
          echo "❄️ Freezing state and performing final backup..."
          touch /tmp/vps_frozen
          pm2 save --force
          
          # Final Master Sync
          rclone sync /home/runner r2_storage:$BUCKET_NAME \
            --exclude "actions-runner/**" --exclude "_work/**" \
            --exclude "**/node_modules/**" --exclude ".npm/**" --exclude ".cache/**" \
            --checksum --fast-list
          
          echo "🚀 Triggering next account: $NEXT_REPO"
          CURRENT_GEN=${{ github.event.inputs.generation || github.event.client_payload.generation || 1 }}
          NEXT_GEN=$(( CURRENT_GEN + 1 ))
          
          curl -L -X POST \
            -H "Authorization: token $NEXT_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$NEXT_REPO/dispatches \
            -d "{\"event_type\": \"trigger_vps\", \"client_payload\": {\"generation\": \"$NEXT_GEN\"}}"
          
          echo "⏲️ Handoff complete. Waiting 5 minutes for overlap before shutdown..."
          sleep 300
          echo "🛑 Graceful exit."
          
