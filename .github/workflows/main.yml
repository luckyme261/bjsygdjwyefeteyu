name: Project-Module-V5.4.5

on:
  workflow_dispatch:
    inputs:
      generation:
        default: '1'
  repository_dispatch:
    types: [trigger_vps, shutdown_previous]

jobs:
  vps-runtime:
    runs-on: ubuntu-latest
    env:
      R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
      R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      BUCKET_NAME: "storage"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision & Pull
        run: |
          sudo npm install -g pm2
          chmod +x install.sh
          ./install.sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Restore State & Kill Predecessor
        env:
          PREV_TOKEN: ${{ secrets.PREV_GH_TOKEN }}
          PREV_REPO: ${{ secrets.PREV_REPO }}
        run: |
          while [ ! -f /home/runner/.files_ready ]; do sleep 2; done
          while [ ! -f /home/runner/.deps_ready ]; do sleep 2; done
          
          pm2 ping
          if [ -f /home/runner/.pm2/dump.pm2 ]; then
            pm2 resurrect || true
            pm2 restart all --update-env || true
          fi
          
          if [ "${{ github.event_type }}" == "trigger_vps" ]; then
             echo "🚀 New Runner Ready. Signaling $PREV_REPO to stop..."
             curl -L -X POST \
              -H "Authorization: token $PREV_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/$PREV_REPO/dispatches \
              -d "{\"event_type\": \"shutdown_previous\"}"
          fi

      - name: Background Incremental Sync (10-Minute Loop)
        run: |
          (
            while true; do
              sleep 600
              pm2 save --force > /dev/null 2>&1
              nice -n 19 rclone sync /home/runner r2_storage:$BUCKET_NAME \
                --exclude "actions-runner/**" \
                --exclude "_work/**" \
                --exclude "**/node_modules/**" \
                --exclude ".npm/**" \
                --exclude ".cache/**" \
                --checksum --fast-list --quiet
            done
          ) &

      - name: Early Handoff Trigger (5.0h)
        env:
          NEXT_TOKEN: ${{ secrets.N_GH_TOKEN }}
          NEXT_REPO: ${{ secrets.REPO }}
        run: |
          sleep $((18000 + RANDOM % 900))
          
          echo "🚨 Triggering next account for zero-downtime..."
          pm2 save --force
          rclone sync /home/runner r2_storage:$BUCKET_NAME \
            --exclude "actions-runner/**" \
            --exclude "_work/**" \
            --exclude "**/node_modules/**" \
            --exclude ".npm/**" \
            --exclude ".cache/**" \
            --checksum --fast-list
          
          CURRENT_GEN=${{ github.event.inputs.generation || github.event.client_payload.generation || 1 }}
          NEXT_GEN=$(( CURRENT_GEN + 1 ))
          
          curl -L -X POST \
            -H "Authorization: token $NEXT_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$NEXT_REPO/dispatches \
            -d "{\"event_type\": \"trigger_vps\", \"client_payload\": {\"generation\": \"$NEXT_GEN\"}}"
          
          echo "⏳ Waiting for shutdown signal..."
          until [ -f /tmp/stop_signal ]; do
            sleep 10
          done
          echo "🛑 Shutting down."

      - name: Receive Shutdown Signal
        if: github.event_type == 'shutdown_previous'
        run: touch /tmp/stop_signal
        
